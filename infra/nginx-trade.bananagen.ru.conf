# Системный Nginx (хост) — публикация trade.bananagen.ru в интернет.
# Проксирует трафик домена на локальный backend pairsignal (uvicorn, 127.0.0.1:8000),
# который отдаёт панель на / и API (/state, /approve, /reject, /player/*, /reset).
# Существующие сайты (bananagen.ru, fluxradar.ru) не затрагиваются.
# TLS терминируется выше (Cloudflare), как и у остальных сайтов — здесь только :80.
#
# Установка (требует sudo):
#   sudo cp /home/nel/trade/infra/nginx-trade.bananagen.ru.conf /etc/nginx/sites-available/trade.bananagen.ru
#   sudo cp /home/nel/trade/infra/trade.htpasswd /etc/nginx/trade.htpasswd
#   sudo ln -s /etc/nginx/sites-available/trade.bananagen.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name trade.bananagen.ru;

    # basic-auth на весь сайт (paper-демо, но наружу открыто)
    auth_basic "pairsignal — paper demo";
    auth_basic_user_file /etc/nginx/trade.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
